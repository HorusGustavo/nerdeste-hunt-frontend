<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Nerdeste Hunt</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>📊 Meu Progresso</h1>
            <p>Jogador: <strong id="user-name"></strong></p>
        </div>

        <!-- BARRA DE PROGRESSO -->
        <div class="progress-container fade-in">
            <div class="progress-text" id="progress-text">0/12 Desafios Concluídos</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar" style="width: 0%;">0%</div>
            </div>
        </div>

        <!-- LISTA DE DESAFIOS COM STATUS -->
        <div id="progresso-container"></div>

        <!-- BOTÃO VOLTAR -->
        <a href="home.html" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
    </div>

    <!-- MENU FIXO INFERIOR -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="scanner.html" class="nav-item">
            <i class="fas fa-qrcode"></i>
            <span>Scanner</span>
        </a>
        <a href="progresso.html" class="nav-item active">
            <i class="fas fa-chart-line"></i>
            <span>Progresso</span>
        </a>
        <a href="colecao.html" class="nav-item">
            <i class="fas fa-id-card"></i>
            <span>Coleção</span>
        </a>
        <a href="ranking.html" class="nav-item">
            <i class="fas fa-trophy"></i>
            <span>Ranking</span>
        </a>
    </nav>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/progresso.js"></script>
</body>
</html>
